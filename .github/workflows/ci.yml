name: CI

on:
  pull_request:
  push:
    branches: [main]

# Avoid piling up redundant runs when new commits land on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App (typecheck / lint / format / test / export / secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit / component tests
        run: npm test -- --ci

      - name: Expo web export (build validation)
        run: npx expo export --platform web

      - name: Secret-leak check (source + exported bundle)
        run: node ./scripts/check-no-secrets.js --bundle-dir dist

  database:
    name: Database (migrations / RLS pgTAP tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Reset database (applies every migration from a clean database)
        run: supabase db reset --local

      - name: Run pgTAP RLS/database test suite
        run: supabase test db --local

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop
